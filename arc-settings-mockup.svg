<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="960" viewBox="0 0 1440 960" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8F3EE"/>
      <stop offset="0.48" stop-color="#EEF4F8"/>
      <stop offset="1" stop-color="#F4F0FA"/>
    </linearGradient>
    <linearGradient id="sidebar" x1="80" y1="58" x2="384" y2="902" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#F6F0EA" stop-opacity="0.62"/>
    </linearGradient>
    <linearGradient id="hero" x1="432" y1="88" x2="1312" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2F3440"/>
      <stop offset="0.56" stop-color="#465365"/>
      <stop offset="1" stop-color="#D58D79"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#313948" flood-opacity="0.13"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#313948" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 38px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #20242C; }
      .h2 { font: 700 23px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #20242C; }
      .h3 { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #252A33; }
      .label { font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5D6471; }
      .small { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #7A8190; }
      .tiny { font: 700 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: .08em; fill: #8C93A0; }
      .whiteTitle { font: 750 32px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #FFFFFF; }
      .whiteText { font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #EDEFF4; }
      .button { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #FFFFFF; }
      .darkButton { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2B303A; }
    </style>
  </defs>

  <rect width="1440" height="960" fill="url(#bg)"/>
  <circle cx="1210" cy="120" r="170" fill="#E8B59C" opacity="0.26"/>
  <circle cx="111" cy="824" r="220" fill="#97C9C4" opacity="0.22"/>
  <circle cx="740" cy="1020" r="300" fill="#B7A8DB" opacity="0.16"/>

  <rect x="48" y="36" width="1344" height="888" rx="30" fill="#FFFFFF" fill-opacity="0.38" stroke="#FFFFFF" stroke-opacity="0.76"/>
  <rect x="80" y="58" width="304" height="844" rx="26" fill="url(#sidebar)" stroke="#FFFFFF" stroke-opacity="0.72" filter="url(#shadow)"/>

  <circle cx="126" cy="112" r="24" fill="#2C323C"/>
  <circle cx="126" cy="112" r="16" fill="#E7A08C"/>
  <text x="166" y="106" class="h3">Personal Hub</text>
  <text x="166" y="128" class="small">admin@example.com</text>

  <rect x="110" y="178" width="244" height="46" rx="14" fill="#2D3340"/>
  <rect x="124" y="191" width="20" height="20" rx="6" fill="#F2C093"/>
  <text x="158" y="207" class="button">设置总览</text>

  <g class="label">
    <rect x="110" y="242" width="244" height="44" rx="14" fill="#FFFFFF" fill-opacity="0.46"/>
    <rect x="124" y="254" width="20" height="20" rx="6" fill="#91B8DF"/>
    <text x="158" y="270">账号与同步</text>

    <rect x="110" y="298" width="244" height="44" rx="14" fill="#FFFFFF" fill-opacity="0.28"/>
    <rect x="124" y="310" width="20" height="20" rx="6" fill="#A9D3B5"/>
    <text x="158" y="326">数据备份</text>

    <rect x="110" y="354" width="244" height="44" rx="14" fill="#FFFFFF" fill-opacity="0.28"/>
    <rect x="124" y="366" width="20" height="20" rx="6" fill="#EBA99B"/>
    <text x="158" y="382">用户权限</text>

    <rect x="110" y="410" width="244" height="44" rx="14" fill="#FFFFFF" fill-opacity="0.28"/>
    <rect x="124" y="422" width="20" height="20" rx="6" fill="#C4A6E8"/>
    <text x="158" y="438">媒体库权限</text>

    <rect x="110" y="466" width="244" height="44" rx="14" fill="#FFFFFF" fill-opacity="0.28"/>
    <rect x="124" y="478" width="20" height="20" rx="6" fill="#E8C774"/>
    <text x="158" y="494">财务导入</text>

    <rect x="110" y="522" width="244" height="44" rx="14" fill="#FFFFFF" fill-opacity="0.28"/>
    <rect x="124" y="534" width="20" height="20" rx="6" fill="#8DD4D1"/>
    <text x="158" y="550">通知提醒</text>
  </g>

  <rect x="110" y="744" width="244" height="110" rx="20" fill="#FFFFFF" fill-opacity="0.58" stroke="#FFFFFF" filter="url(#soft)"/>
  <text x="132" y="780" class="tiny">SERVER STATUS</text>
  <text x="132" y="812" class="h3">同步运行中</text>
  <text x="132" y="838" class="small">最后同步：2 分钟前</text>
  <circle cx="322" cy="805" r="14" fill="#6FCF97"/>

  <text x="432" y="88" class="tiny">ARC INSPIRED SETTINGS</text>
  <text x="432" y="134" class="title">设置中心</text>
  <text x="432" y="162" class="label">低干扰、分组清晰、像浏览器控制中心一样管理账号、同步、用户权限和媒体库。</text>

  <rect x="432" y="198" width="880" height="196" rx="26" fill="url(#hero)" filter="url(#shadow)"/>
  <text x="472" y="258" class="whiteTitle">账号健康状态</text>
  <text x="472" y="290" class="whiteText">服务器账号已连接，实时同步开启，媒体库权限可由管理员统一控制。</text>
  <rect x="472" y="326" width="126" height="40" rx="12" fill="#FFFFFF" fill-opacity="0.20" stroke="#FFFFFF" stroke-opacity="0.36"/>
  <text x="500" y="351" class="button">立即同步</text>
  <rect x="616" y="326" width="126" height="40" rx="12" fill="#FFFFFF" fill-opacity="0.86"/>
  <text x="642" y="351" class="darkButton">检查状态</text>
  <rect x="1080" y="238" width="178" height="110" rx="22" fill="#FFFFFF" fill-opacity="0.18" stroke="#FFFFFF" stroke-opacity="0.28"/>
  <text x="1104" y="274" class="whiteText">当前账号</text>
  <text x="1104" y="310" class="whiteTitle" style="font-size:26px">Admin</text>
  <text x="1104" y="334" class="whiteText">管理员权限</text>

  <g filter="url(#soft)">
    <rect x="432" y="426" width="268" height="158" rx="22" fill="#FFFFFF" fill-opacity="0.74" stroke="#FFFFFF"/>
    <rect x="462" y="456" width="46" height="46" rx="14" fill="#DCEAF8"/>
    <path d="M475 479h20M485 469v20" stroke="#557DA8" stroke-width="3" stroke-linecap="round"/>
    <text x="462" y="532" class="h3">服务器同步</text>
    <text x="462" y="558" class="small">立即推送、恢复数据、导出备份。</text>

    <rect x="728" y="426" width="268" height="158" rx="22" fill="#FFFFFF" fill-opacity="0.74" stroke="#FFFFFF"/>
    <rect x="758" y="456" width="46" height="46" rx="14" fill="#F7E4DA"/>
    <path d="M771 480h20M781 470v20" stroke="#BA6F58" stroke-width="3" stroke-linecap="round"/>
    <text x="758" y="532" class="h3">用户权限</text>
    <text x="758" y="558" class="small">管理禁用、邮箱验证、媒体授权。</text>

    <rect x="1024" y="426" width="288" height="158" rx="22" fill="#FFFFFF" fill-opacity="0.74" stroke="#FFFFFF"/>
    <rect x="1054" y="456" width="46" height="46" rx="14" fill="#E8DFF7"/>
    <path d="M1068 482c7-14 20-14 27 0" stroke="#7D63B8" stroke-width="3" stroke-linecap="round"/>
    <text x="1054" y="532" class="h3">媒体库</text>
    <text x="1054" y="558" class="small">授权用户查看影像馆并上传文件。</text>
  </g>

  <rect x="432" y="618" width="556" height="236" rx="24" fill="#FFFFFF" fill-opacity="0.72" stroke="#FFFFFF" filter="url(#soft)"/>
  <text x="466" y="662" class="h2">用户与权限</text>
  <text x="466" y="690" class="small">管理员后台的高频操作集中在这里，不再散落到长页面底部。</text>

  <rect x="466" y="724" width="488" height="1" fill="#E6E8EE"/>
  <circle cx="490" cy="762" r="18" fill="#EFA48F"/>
  <text x="522" y="757" class="h3" style="font-size:16px">user@example.com</text>
  <text x="522" y="780" class="small">正常 · 邮箱已验证 · 媒体库已授权</text>
  <rect x="828" y="744" width="94" height="36" rx="12" fill="#2D3340"/>
  <text x="851" y="767" class="button" style="font-size:13px">管理</text>

  <circle cx="490" cy="816" r="18" fill="#9ACBBF"/>
  <text x="522" y="811" class="h3" style="font-size:16px">guest@example.com</text>
  <text x="522" y="834" class="small">正常 · 邮箱已验证 · 未开通媒体库</text>
  <rect x="828" y="798" width="94" height="36" rx="12" fill="#F0F2F6"/>
  <text x="848" y="821" class="darkButton" style="font-size:13px">授权</text>

  <rect x="1020" y="618" width="292" height="236" rx="24" fill="#FFFFFF" fill-opacity="0.72" stroke="#FFFFFF" filter="url(#soft)"/>
  <text x="1054" y="662" class="h2">媒体权限</text>
  <text x="1054" y="690" class="small">影像馆入口只对授权用户显示。</text>
  <rect x="1054" y="728" width="224" height="12" rx="6" fill="#ECEFF4"/>
  <rect x="1054" y="728" width="156" height="12" rx="6" fill="#C4A6E8"/>
  <text x="1054" y="770" class="h3" style="font-size:34px">12.8 GB</text>
  <text x="1054" y="798" class="small">媒体库总占用</text>
  <rect x="1054" y="818" width="132" height="36" rx="12" fill="#2D3340"/>
  <text x="1080" y="841" class="button" style="font-size:13px">查看影像馆</text>
</svg>
