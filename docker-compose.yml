services:
  personal-hub:
    build:
      context: .
    container_name: personal-hub
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 5173
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SUBSCRIPTION_EMAIL_FROM: ${SUBSCRIPTION_EMAIL_FROM:-}
      FINANCE_AI_API_KEY: ${FINANCE_AI_API_KEY:-}
      FINANCE_AI_MODEL: ${FINANCE_AI_MODEL:-}
      FINANCE_AI_API_URL: ${FINANCE_AI_API_URL:-https://api.openai.com/v1/chat/completions}
      PERSONAL_HUB_SYNC_TOKEN: ${PERSONAL_HUB_SYNC_TOKEN:-}
      PERSONAL_HUB_DATA_FILE: /app/data/personal-hub-data.json
      PERSONAL_HUB_BACKUP_DIR: /app/data/backups
      PERSONAL_HUB_BACKUP_KEEP: ${PERSONAL_HUB_BACKUP_KEEP:-14}
      PERSONAL_HUB_BACKUP_AUTO_ENABLED: ${PERSONAL_HUB_BACKUP_AUTO_ENABLED:-true}
      PERSONAL_HUB_BACKUP_INTERVAL_HOURS: ${PERSONAL_HUB_BACKUP_INTERVAL_HOURS:-24}
      PERSONAL_HUB_BACKUP_ON_START: ${PERSONAL_HUB_BACKUP_ON_START:-false}
      PERSONAL_HUB_AUTH_DB_FILE: /app/data/personal-hub.sqlite
      PERSONAL_HUB_ADMIN_USERNAME: ${PERSONAL_HUB_ADMIN_USERNAME:-}
      PERSONAL_HUB_ADMIN_PASSWORD: ${PERSONAL_HUB_ADMIN_PASSWORD:-}
      PERSONAL_HUB_SESSION_MAX_AGE: ${PERSONAL_HUB_SESSION_MAX_AGE:-604800}
      PERSONAL_HUB_SECURE_COOKIE: ${PERSONAL_HUB_SECURE_COOKIE:-true}
      PERSONAL_HUB_REGISTRATION_ENABLED: ${PERSONAL_HUB_REGISTRATION_ENABLED:-false}
      PERSONAL_HUB_REGISTRATION_CODE: ${PERSONAL_HUB_REGISTRATION_CODE:-}
      AUTH_EMAIL_FROM: ${AUTH_EMAIL_FROM:-}
      AUTH_EMAIL_VERIFICATION_MAX_AGE: ${AUTH_EMAIL_VERIFICATION_MAX_AGE:-86400}
      AUTH_PASSWORD_RESET_MAX_AGE: ${AUTH_PASSWORD_RESET_MAX_AGE:-3600}
      AUTH_REGISTER_CODE_MAX_AGE: ${AUTH_REGISTER_CODE_MAX_AGE:-600}
      AUTH_REGISTER_CODE_COOLDOWN: ${AUTH_REGISTER_CODE_COOLDOWN:-60}
      AUTH_REGISTER_CODE_MAX_ATTEMPTS: ${AUTH_REGISTER_CODE_MAX_ATTEMPTS:-5}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://www.aedclan.com}
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - personal-hub-data:/app/data
      - ./assets/login-covers:/app/assets/login-covers
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5173/healthz | grep -q '\"ok\":true'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  personal-hub-data:
